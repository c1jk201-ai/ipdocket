{% extends 'invoice_base.html' %}
{% block invoice_content %}
 <div class="page-header">
  <h2 style="margin:0;"> Edit</h2>
  <div class="page-actions">
   <a class="btn btn-ghost" href="{{ url_for('billing_invoices.expenses.list_expenses') }}">Listto</a>
  </div>
 </div>

 <div class="card" style="margin-top:12px;">
  <form method="post" class="row g-2 align-items-end">
   <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
   <div class="col-12 col-md-4 col-lg-3">
    <label>days</label>
    <input type="date" name="expense_date" value="{{ expense.expense_date }}">
   </div>
   <div class="col-12 col-md-4 col-lg-3">
    <label>Business profile</label>
    <select name="business_profile_id">
     {% for bp in business_profiles %}
      <option value="{{ bp.id }}" {% if expense.business_profile_id == bp.id %}selected{% endif %}>{{ bp.name }}</option>
     {% endfor %}
    </select>
   </div>
   <div class="col-12 col-md-4 col-lg-3">
    <label> category</label>
    <select name="category_id">
     <option value="">Uncategorized</option>
     {% for cat in categories %}
      <option value="{{ cat.id }}" {% if expense.category_id == cat.id %}selected{% endif %}>{{ cat.name }}</option>
     {% endfor %}
    </select>
   </div>
   <div class="col-12 col-md-4 col-lg-2">
    <label>Currency</label>
    <input type="text" name="currency" value="{{ expense.currency or 'USD' }}">
   </div>
   <div class="col-12 col-md-6 col-lg-4">
    <label></label>
    <input type="text" name="vendor_name" value="{{ expense.vendor_name or '' }}">
   </div>
   <div class="col-12 col-md-6 col-lg-3">
    <label>Business profile</label>
    <input type="text" name="vendor_tax_id" value="{{ expense.vendor_tax_id or '' }}">
   </div>
   <div class="col-12 col-md-6 col-lg-3">
    <label>Taxable amount</label>
    <input type="number" step="0.01" name="net_amount" value="{{ expense.net_amount or 0 }}">
   </div>
   <div class="col-12 col-md-6 col-lg-3">
    <label>Sales tax</label>
    <input type="number" step="0.01" name="vat_amount" value="{{ expense.vat_amount or 0 }}">
   </div>
   <div class="col-12">
    <label>Content</label>
    <input type="text" name="description" value="{{ expense.description or '' }}">
   </div>
   <div class="col-12 col-md-6 col-lg-3">
    <label>Tax record type</label>
    <select name="tax_type">
     <option value="tax_invoice" {% if expense.tax_type == 'tax_invoice' %}selected{% endif %}>Tax documentation</option>
     <option value="cash_receipt" {% if expense.tax_type == 'cash_receipt' %}selected{% endif %}>Payment receipt</option>
     <option value="card" {% if expense.tax_type == 'card' %}selected{% endif %}>Card</option>
     <option value="other" {% if expense.tax_type == 'other' %}selected{% endif %}>Other</option>
    </select>
   </div>
   <div class="col-12 col-md-6 col-lg-3">
    <label>Input </label>
    <label style="display:flex; align-items:center; gap:6px; margin-top:6px;">
     <input type="checkbox" name="input_vat_eligible" value="1" {% if expense.input_vat_eligible %}checked{% endif %}>
      target
    </label>
   </div>
   <div class="col-12">
    <label>Notes</label>
    <input type="text" name="memo" value="{{ expense.memo or '' }}">
   </div>
   <div class="col-12">
    <div class="d-flex gap-2 justify-content-end flex-wrap">
     <button class="btn btn-primary" type="submit">Save</button>
     <a class="btn btn-ghost" href="{{ url_for('billing_invoices.expenses.list_expenses') }}">Cancel</a>
    </div>
   </div>
  </form>
 </div>
{% endblock %}
