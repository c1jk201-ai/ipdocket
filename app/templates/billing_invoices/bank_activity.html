 {# // ===== Matching UI logic =====
 function dashDateFromYmd(ymd){
  if(!ymd || ymd.length!==8) return '';
  return `${ymd.slice(0,4)}-${ymd.slice(4,6)}-${ymd.slice(6,8)}`;
 }

 function buildDepositSummary(item){
  const parts = [];
  if (item.remark1) parts.push(item.remark1);
  if (item.remark2) parts.push(item.remark2);
  if (item.remark3) parts.push(item.remark3);
  if (!parts.length && item.memo) parts.push(item.memo);
  return parts.join(' | ');
 }

 async function loadMatchingInvoices(){
  const token = ++MATCH_INV_TOKEN;
  const sdate = document.getElementById('startDate').value;
  const edate = document.getElementById('endDate').value;
  const url = `${scriptRoot}/bank_activity/matching/invoices?date_from=${encodeURIComponent(sdate)}&date_to=${encodeURIComponent(edate)}&currency=${encodeURIComponent(BANK_ACTIVITY_CURRENCY)}&limit=200`;
  const res = await fetchJSON(url);
  if (token !== MATCH_INV_TOKEN) return;
  const tbody = document.querySelector('#matchInvoicesTable tbody');
  tbody.innerHTML = '';
  (res.items||[]).forEach((it, idx)=>{
   const tr = document.createElement('tr');
   tr.dataset.invoiceId = it.id;
   tr.innerHTML = `
    <td class="a_c">${idx+1}</td>
    <td class="a_c">${it.number||''}</td>
    <td class="a_c">${it.client_name||''}</td>
    <td class="a_c">${it.issue_date||''}</td>
    <td class="a_r">${formatBankActivityMoney(it.total||0)}</td>
   `;
   // drop targets
   tr.addEventListener('dragover', (ev)=>{ ev.preventDefault(); tr.classList.add('drop-ready'); });
   tr.addEventListener('dragleave', ()=> tr.classList.remove('drop-ready'));
   tr.addEventListener('drop', async (ev)=>{
    ev.preventDefault(); tr.classList.remove('drop-ready');
    try{
     const data = ev.dataTransfer.getData('text/plain');
     const dep = JSON.parse(data);
     await matchDepositToInvoice(it.id, dep, tr);
    }catch(e){ try{ await window.AppAlert((e && e.message) ? e.message : String(e), { title: "Error" }); }catch(e2){} }
   });
   tbody.appendChild(tr);
  });
 }

 async function loadMatchingDeposits(){
  const token = ++MATCH_DEP_TOKEN;
  const sdateStr = document.getElementById('startDate').value.replaceAll('-','');
  const edateStr = document.getElementById('endDate').value.replaceAll('-','');
  const accs = [];
  document.querySelectorAll('input[name="activeAccount"]:checked').forEach(chk=> accs.push(chk.value));
  if (!accs.length) return;
  const url = `${scriptRoot}/bank_activity/matching/deposits?sdate=${encodeURIComponent(sdateStr)}&edate=${encodeURIComponent(edateStr)}&accounts=${encodeURIComponent(accs.join(','))}&currency=${encodeURIComponent(BANK_ACTIVITY_CURRENCY)}&limit=500`;
  const res = await fetchJSON(url);
  if (token !== MATCH_DEP_TOKEN) return;
  const tbody = document.querySelector('#matchDepositsTable tbody');
  tbody.innerHTML = '';
  (res.items||[]).forEach((r)=>{
   const tr = document.createElement('tr');
   const alias = `${r.bankCode||''} ${r.accountNumber||''}`.trim();
   const summary = buildDepositSummary(r);
   tr.draggable = true;
   tr.addEventListener('dragstart', (ev)=>{
    tr.classList.add('dragging');
    const payload = {
     tid: r.tid, accIn: parseMoney(r.accIn||0), trdt: r.trdt||r.trdate, bankCode: r.bankCode, accountNumber: r.accountNumber,
     alias: alias, summary: summary
    };
    ev.dataTransfer.setData('text/plain', JSON.stringify(payload));
   });
   tr.addEventListener('dragend', ()=> tr.classList.remove('dragging'));
   tr.innerHTML = `
    <td class="a_c">${formatTrdt(r.trdt || r.trdate)}</td>
    <td class="a_r">${formatBankActivityMoney(r.accIn||0)}</td>
    <td class="a_c">${escapeHtml(alias)}</td>
    <td class="a_c">${escapeHtml(summary)||'-'}</td>
   `;
   tbody.appendChild(tr);
  });
 }

 async function matchDepositToInvoice(invoiceId, dep, trEl){
  // Build payment_meta for the selected invoice currency
  const dateStr = (function(){
   const dt = parseTrdtToDate(dep.trdt);
   if (!dt) return '';
   return `${dt.getFullYear()}-${pad2(dt.getMonth()+1)}-${pad2(dt.getDate())}`;
  })();
  const meta = {
   currency: BANK_ACTIVITY_CURRENCY,
   date: dateStr,
   account_alias: dep.alias || `${dep.bankCode||''} ${dep.accountNumber||''}`.trim(),
   deposit: parseMoney(dep.accIn||0),
   summary: dep.summary || ''
  };
  // Save then verify
  const scriptRoot = "{{ request.script_root }}/accounting/invoice-system";
  await fetchJSON(`${scriptRoot}/invoices/${invoiceId}/save_payment_meta`, {method:'POST', body: JSON.stringify({payment_meta: meta})});
  const v = await fetchJSON(`${scriptRoot}/invoices/${invoiceId}/verify_payment`, {method:'POST', body: JSON.stringify({payment_meta: meta})});
  if (v && v.ok){
   // Visually mark invoice row as matched
   try{
    const row = document.querySelector(`#matchInvoicesTable tr[data-invoice-id="${invoiceId}"]`);
    if (row){ row.style.background = '#ecfdf5'; row.title = ' Done (paid)'; }
  }catch(e){}
 } else {
   try{ await window.AppAlert(` : ${(v && v.reason) || ' people'}`, { title: "Confirm" }); }catch(e2){}
  }
 }

 async function refreshMatching(){
  await Promise.all([loadMatchingInvoices(), loadMatchingDeposits()]);
 }

 <script>
 const CSRF = document.querySelector('meta[name="csrf-token"]').getAttribute('content');
 const scriptRoot = "{{ request.script_root }}/accounting/invoice-system";
 const BANK_ACTIVITY_CURRENCY = "{{ selected_currency or 'USD' }}";
 const BANK_ACCOUNT_PROVIDER = "{{ bank_account_provider or 'manual' }}";
 let CURRENT_JOB_ID = null; // kept for backward compatibility (single-job flows)
 let SELECTED_ACCOUNT_LABEL = '';
 let LAST_JOB_IDS = []; // aggregated job IDs from last collection
 let JOB_ALIAS = {}; // jobId -> alias label
 let ALIAS_BY_ACC = {}; // bankCode|accountNumber -> preferred alias (accountName + bankCode)
 let RENDER_MODE = 'local'; // 'local' | 'jobs'
 let ACCOUNTS_LOAD_TOKEN = 0;
 let COVERAGE_LOAD_TOKEN = 0;
 let LOCAL_RENDER_TOKEN = 0;
 let LOCAL_SUMMARY_TOKEN = 0;
 let AGG_RENDER_TOKEN = 0;
 let COLLECT_TOKEN = 0;
 let SEARCH_TOKEN = 0;
 let MATCH_INV_TOKEN = 0;
 let MATCH_DEP_TOKEN = 0;
 let ACCOUNT_CHANGE_BOUND = false;

 function escapeHtml(text) {
  if (text === null || typeof text === "undefined") return "";
  return String(text)
   .replace(/&/g, "&amp;")
   .replace(/</g, "&lt;")
   .replace(/>/g, "&gt;")
   .replace(/"/g, "&quot;")
   .replace(/'/g, "&#039;");
 }

 function getInvoiceRoot() {
  return document.querySelector('.invoice-theme') || document.body;
 }

 function parseMoney(value) {
  const n = Number(String(value == null ? "0" : value).replaceAll(",", ""));
  return Number.isFinite(n) ? n : 0;
 }

 function formatBankActivityMoney(value) {
  const scale = BANK_ACTIVITY_CURRENCY === "USD" ? 0 : 2;
  const n = parseMoney(value);
  return `${n.toLocaleString(undefined, {
   minimumFractionDigits: scale === 0 || Number.isInteger(n) ? 0 : scale,
   maximumFractionDigits: scale,
  })} ${BANK_ACTIVITY_CURRENCY}`;
 }

 function setHidden(el, hidden) {
  if (!el) return;
  el.classList.toggle('is-hidden', hidden);
 }

	 async function fetchJSON(url, opts={}){
	  const res = await fetch(url, {headers: {'X-CSRFToken': CSRF, 'Content-Type':'application/json', 'Accept':'application/json'}, credentials:'same-origin', ...opts});
	  if(!res.ok){
   const text = await res.text().catch(()=> '');
   let msg = res.statusText;
   let codeInfo = ` (HTTP ${res.status})`;
   if (text){
    try {
     const j = JSON.parse(text);
     msg = (j.message || j.msg || j.error || msg);
     if (j.code !== undefined) codeInfo = ` (code ${j.code})`;
    } catch(_){
     msg = text;
    }
   }
   throw new Error(`${msg}${codeInfo}`);
	  }
	  return res.json();
	 }

 async function saveManualTransactionFromForm(){
  const payload = {
   currency: BANK_ACTIVITY_CURRENCY,
   transactionDate: document.getElementById('manualTxDate').value,
   bankCode: 'MANUAL',
   accountNumber: document.getElementById('manualTxAccount').value.trim(),
   accountName: document.getElementById('manualTxAccountName').value.trim(),
   accIn: document.getElementById('manualTxIn').value,
   accOut: document.getElementById('manualTxOut').value,
   balance: document.getElementById('manualTxBalance').value,
   payerName: document.getElementById('manualTxPayer').value.trim(),
   reference: document.getElementById('manualTxReference').value.trim(),
   description: document.getElementById('manualTxDescription').value.trim(),
  };
  const result = await fetchJSON(`${scriptRoot}/bank_activity/manual_transaction`, {
   method: 'POST',
   body: JSON.stringify(payload)
  });
  document.getElementById('manualTxIn').value = '';
  document.getElementById('manualTxOut').value = '';
  document.getElementById('manualTxBalance').value = '';
  document.getElementById('manualTxPayer').value = '';
  document.getElementById('manualTxReference').value = '';
  document.getElementById('manualTxDescription').value = '';
  await loadAccounts();
  try {
   const key = `${result.bankCode || 'MANUAL'}|${result.accountNumber || payload.accountNumber}`;
   const cb = document.querySelector(`input[name="activeAccount"][value="${CSS.escape(key)}"]`);
   if (cb) cb.checked = true;
  } catch (_) {}
  document.getElementById('page').value = '1';
  await renderLocal();
  await updateCoverage();
  return result;
 }

	 function showPagingError(error) {
	  const message = error && error.message ? error.message : String(error);
	  if (window.AppAlert) {
	   window.AppAlert(message, { title: "Error" }).catch(() => {});
	   return;
	  }
	  console.error(error);
	 }

	 function renderBankActivityPaging(pageNum, pageCount, reloadFn) {
	  const paging = document.getElementById('paging');
	  if (!paging) return;
	  window.AppPagination.render(paging, {
	   page: pageNum,
	   totalPages: pageCount,
	   ariaLabel: ' Pagination',
	   onPageChange: async (nextPage) => {
	    document.getElementById('page').value = String(nextPage);
	    try {
	     await (reloadFn || renderBasedOnMode)();
	    } catch (error) {
	     showPagingError(error);
	    }
	   },
	  });
	 }

	 // ----- Date/Time formatting helpers -----
 function pad2(n){ return String(n).padStart(2,'0'); }
 function formatLocalDate(d){
  const y = d.getFullYear();
  const m = pad2(d.getMonth()+1);
  const da = pad2(d.getDate());
  return `${y}-${m}-${da}`;
 }
 function parseTrdtToDate(trdt){
  if(!trdt) return null;
  if (/^\d{14}$/.test(trdt)){
   const y = parseInt(trdt.slice(0,4),10);
   const m = parseInt(trdt.slice(4,6),10)-1;
   const d = parseInt(trdt.slice(6,8),10);
   const hh = parseInt(trdt.slice(8,10),10);
   const mm = parseInt(trdt.slice(10,12),10);
   const ss = parseInt(trdt.slice(12,14),10);
   return new Date(y, m, d, hh, mm, ss);
  }
  const dt = new Date(trdt);
  if (!isNaN(dt.getTime())) return dt;
  return null;
 }
 function formatTrdt(trdt){
  const dt = parseTrdtToDate(trdt);
  if(!dt){
   const safe = (trdt||'').toString().replace('T',' ').replace('Z','');
   if (safe.length>=10) return `${safe.slice(0,10)}<br>${safe.slice(11,19)}`;
   return safe || '-';
  }
  const y = dt.getFullYear();
  const m = pad2(dt.getMonth()+1);
  const d = pad2(dt.getDate());
  const hh = pad2(dt.getHours());
  const mm = pad2(dt.getMinutes());
  const ss = pad2(dt.getSeconds());
  return `${y}-${m}-${d}<br>${hh}:${mm}:${ss}`;
 }
 function toTimestamp(trdt){
  const dt = parseTrdtToDate(trdt);
  if(!dt){
   if (/^\d{8}$/.test(trdt)){
    const y = parseInt(trdt.slice(0,4),10); const m = parseInt(trdt.slice(4,6),10)-1; const d = parseInt(trdt.slice(6,8),10);
    return new Date(y, m, d).getTime();
   }
   return 0;
  }
  return dt.getTime();
 }

 // Convert SQL UTC timestamp (e.g., 'YYYY-MM-DD HH:MM:SS' or ISO) to Eastern display string.
 function utcSqlToKstString(s){
  if(!s) return '';
  try{
   const raw = String(s).trim();
   const formatEastern = (dt) => {
    if (window.AppDate && typeof window.AppDate.formatDisplayDateTime === 'function') {
     return window.AppDate.formatDisplayDateTime(dt, { seconds: true });
    }
    return dt.toLocaleString('en-US', {
     timeZone: 'America/New_York',
     year: 'numeric',
     month: '2-digit',
     day: '2-digit',
     hour: '2-digit',
     minute: '2-digit',
     second: '2-digit'
    });
   };
   const hasTz = /(?:GMT|UTC|[+-]\d{2}:?\d{2}|T|Z$)/i.test(raw);
   const parsed = new Date(hasTz ? raw : `${raw.replace(' ', 'T')}Z`);
   if (!Number.isNaN(parsed.getTime())){
    return formatEastern(parsed);
   }

   const t = raw.replace('T',' ').replace('Z','');
   const m = t.match(/^(\d{4})-(\d{2})-(\d{2})[ ](\d{2}):(\d{2}):(\d{2})/);
   if(!m) return raw;
   const y = parseInt(m[1],10), mo = parseInt(m[2],10)-1, d = parseInt(m[3],10);
   const hh = parseInt(m[4],10), mm = parseInt(m[5],10), ss = parseInt(m[6],10);
   return formatEastern(new Date(Date.UTC(y, mo, d, hh, mm, ss)));
  }catch(e){ return String(s); }
 }

 // ----- Row background color per account alias -----
 function _aliasHue(alias){
  let h = 0;
  const s = (alias || '').toString();
  for (let i=0;i<s.length;i++){ h = (h*31 + s.charCodeAt(i))>>> 0; }
  return h % 360;
 }
 function aliasColor(alias){
  const hue = _aliasHue(alias);
  return `hsl(${hue}, 78%, 94%)`;
 }
 function aliasAccentColor(alias){
  const hue = _aliasHue(alias);
  return `hsl(${hue}, 72%, 42%)`;
 }

 function ymd(date){
  const y = date.getFullYear();
  const m = pad2(date.getMonth()+1);
  const da = pad2(date.getDate());
  return `${y}${m}${da}`;
 }

 function setDTQuarter(code){
  const now = new Date();
  const y = now.getFullYear();
  let start, end;
  if (code === 0) {
   // This year
   start = new Date(y, 0, 1);
   end = new Date(y, 11, 31);
  } else if (code === 1) {
   // 1 (H1)
   start = new Date(y, 0, 1);
   end = new Date(y, 5, 30);
  } else if (code === 2) {
   // 2 (H2)
   start = new Date(y, 6, 1);
   end = new Date(y, 11, 31);
  } else {
   // 3:Q1, 4:Q2, 5:Q3, 6:Q4
   const q = code - 2; // 1..4
   const qStartMonth = (q-1)*3; // 0,3,6,9
   start = new Date(y, qStartMonth, 1);
   end = new Date(y, qStartMonth + 3, 0);
  }
  document.getElementById('startDate').value = formatLocalDate(start);
  document.getElementById('endDate').value = formatLocalDate(end);
 }

 function toYmd(d){
  const y = d.getFullYear();
  const m = pad2(d.getMonth()+1);
  const da = pad2(d.getDate());
  return `${y}${m}${da}`;
 }

 function addMonthsClamped(date, months){
  const y = date.getFullYear();
  const m = date.getMonth();
  const d = date.getDate();
  const targetMonthIndex = m + months;
  const targetYear = y + Math.floor(targetMonthIndex / 12);
  const normalizedMonth = ((targetMonthIndex % 12) + 12) % 12;
  const lastDay = new Date(targetYear, normalizedMonth + 1, 0).getDate();
  return new Date(targetYear, normalizedMonth, Math.min(d, lastDay));
 }

 function parseInputYmd(id){
  const v = document.getElementById(id).value;
  const [y,m,dd] = v.split('-').map(x=>parseInt(x,10));
  return new Date(y, m-1, dd);
 }

 function addDays(date, days){ const d = new Date(date.getTime()); d.setDate(d.getDate()+days); return d; }

 function clampToLast3Months(start, end){
  const minStart = addMonthsClamped(end, -3);
  if (start < minStart) return minStart; else return start;
 }

 function sliceMonthlyWindows(sdateStr, edateStr){
  // Return array of {s,e} in yyyymmdd, each window <= 1 calendar month.
  const sInput = new Date(sdateStr.slice(0,4), parseInt(sdateStr.slice(4,6))-1, parseInt(sdateStr.slice(6,8)));
  const eInput = new Date(edateStr.slice(0,4), parseInt(edateStr.slice(4,6))-1, parseInt(edateStr.slice(6,8)));
  let start = clampToLast3Months(sInput, eInput);
  let end = eInput;
  const wins = [];
  let cur = new Date(start.getTime());
  while (cur <= end){
   const ewin = addMonthsClamped(cur, 1);
   const e = ewin < end ? ewin : end;
   wins.push({ s: toYmd(cur), e: toYmd(e) });
   cur = addDays(e, 1);
  }
  return wins;
 }

 // Coverage: DB range and last collection
 async function updateCoverage(){
  const token = ++COVERAGE_LOAD_TOKEN;
  const accs = [];
  document.querySelectorAll('input[name="activeAccount"]:checked').forEach(chk=> accs.push(chk.value));
  const el = document.getElementById('coverageInfo');
  if(!el) return;
  if(!accs.length){ el.textContent = 'Bank account Select.'; return; }
  const params = encodeURIComponent(accs.join(','));
  try{
   const [res, sched] = await Promise.all([
    fetchJSON(`${scriptRoot}/bank_activity/coverage?accounts=${params}`),
    fetchJSON(`${scriptRoot}/bank_activity/scheduler_status`).catch(()=> null)
   ]);
   if (token !== COVERAGE_LOAD_TOKEN) return;
   const dash = (s)=> (s && s.length===8) ? `${s.slice(0,4)}-${s.slice(4,6)}-${s.slice(6,8)}` : (s||'-');
   const safe = (s)=> escapeHtml((s || '').toString());
   const easternLabel = (s)=>{
    const raw = (s || '').toString().trim();
    if (!raw) return '';
    if (/\b(?:GMT|UTC|ET)\b/i.test(raw)) return safe(raw);
    return `${safe(raw)} ET`;
   };
   const dbRange = (res.dbMinTrdate || res.dbMaxTrdate) ? `${dash(res.dbMinTrdate)} ~ ${dash(res.dbMaxTrdate)}` : '-';
   const j = res.lastJob || null;
   let upd = '';
   if (j) {
    if (j.updatedAtKst) upd = j.updatedAtKst;
    else if (j.updatedAt) upd = utcSqlToKstString(j.updatedAt);
   }

   const lastStr = j
    ? `${safe(dash(j.sdate||''))} ~ ${safe(dash(j.edate||''))}${upd ? ` (: ${easternLabel(upd)})` : ''}`
    : '-';

   const dbUpd = res.dbMaxUpdatedAtKst || (res.dbMaxUpdatedAt ? utcSqlToKstString(res.dbMaxUpdatedAt) : '');
   const tx = res.lastJobTx || null;
   const txUpdated = tx ? (tx.maxUpdatedAtKst || (tx.maxUpdatedAt ? utcSqlToKstString(tx.maxUpdatedAt) : '')) : '';
   const txInfo = tx
    ? ` | DB: <b>${(tx.count||0).toLocaleString()}items</b>${txUpdated ? ` (Save: ${easternLabel(txUpdated)})` : ''}`
    : '';

   let schedStr = '';
   let lastRunStr = '';
   try{
    const e = sched && sched.bank_activity ? sched.bank_activity : null;
    if (sched && sched.running !== undefined){
     const runStr = sched.running ? 'ON' : 'OFF';
     const nextStr = (e && (e.nextRunTimeKst || e.nextRunTime)) ? (e.nextRunTimeKst || e.nextRunTime) : '-';
     schedStr = ` | Auto: <b>${safe(runStr)}</b> (Next: ${nextStr === '-' ? '-' : easternLabel(nextStr)})`;
    }

    const lr = sched && sched.bank_activityLastRun ? sched.bank_activityLastRun : null;
    if (lr && (lr.startedAt || lr.endedAt)){
     const ok = !!lr.ok;
     const start = safe(lr.startedAt || '-');
     const end = safe(lr.endedAt || '-');
     const rows = (lr.rowsPersisted !== undefined && lr.rowsPersisted !== null) ? Number(lr.rowsPersisted||0).toLocaleString() : '-';
     const req = (lr.requested !== undefined && lr.requested !== null) ? Number(lr.requested||0).toLocaleString() : '-';
     const err = lr.error ? safe(lr.error) : '';
     if (ok){
      lastRunStr = ` | Auto: <b class="blue3">success</b> (${start} ~ ${end}, :${req}, Save:${rows})`;
     } else {
      lastRunStr = ` | Auto: <b class="red3"></b> (${start} ~ ${end}${err ? `, ${err}` : ''})`;
     }
    }
   }catch(_){ schedStr = ''; }

   // Per-account diagnostic line: jobState/error + persisted row count
   let perAcc = '';
   const items = Array.isArray(res.accountStatuses) ? res.accountStatuses : [];
   if (items.length){
    const parts = items.map(it=>{
     const key = `${it.bankCode||''}|${it.accountNumber||''}`;
     const alias = escapeHtml(ALIAS_BY_ACC[key] || key);
     const lj = it.lastJob || null;
     const ljtx = it.lastJobTx || null;
     const st = lj ? `state:${(lj.jobState || '-')}/err:${(lj.errorCode || '-')}` : 'nojob';
     const cnt = ljtx ? `${(ljtx.count||0).toLocaleString()}items` : '-';
     const reason = (lj && lj.errorCode && String(lj.errorCode) !== '1' && lj.errorReason) ? ` (${escapeHtml(lj.errorReason)})` : '';
     return `${alias}: ${escapeHtml(st)}, DB:${escapeHtml(cnt)}${reason}`;
    });
    perAcc = `<br><span class="gray2 f11">${parts.join(' | ')}</span>`;
   }

   const dbUpdInfo = dbUpd ? ` | DBSave: <b>${easternLabel(dbUpd)}</b>` : '';
   el.innerHTML = `DB : <b>${safe(dbRange)}</b>${dbUpdInfo} | (job): <b>${lastStr}</b>${txInfo}${schedStr}${lastRunStr}${perAcc}`;
  }catch(err){
   if (token !== COVERAGE_LOAD_TOKEN) return;
   el.textContent = '';
  }
 }

 function extractInvoiceNumberFromMemo(memo){
  try{
   const s = (memo || '').toString();
   const matches = [...s.matchAll(/INV:([^\s|]+)/g)];
   if (!matches.length) return null;
   const last = (matches[matches.length - 1] && matches[matches.length - 1][1]) ? String(matches[matches.length - 1][1]).trim() : '';
   return last || null;
  }catch(_){
   return null;
  }
 }

 function confirmByTypingNumbers(title, invoiceNumbersText){
  return new Promise(function(resolve){
   try{
    const existing = document.getElementById('invoiceConfirmOverlay');
    if (existing){
     existing.remove();
    }

    const overlay = document.createElement('div');
    overlay.id = 'invoiceConfirmOverlay';
    overlay.className = 'modal-overlay show';

    const panel = document.createElement('div');
    panel.className = 'modal-card is-wide confirm-panel';

    panel.innerHTML = `
     <h3 class="modal-title">${title}</h3>
     <p class="modal-help">below Invoice number All  , below input field  .</p>
     <div id="invoiceConfirmNumbersBox" class="confirm-box"></div>
     <input type="text" id="invoiceConfirmInput" class="confirm-input input-inline" placeholder="  Paste" />
     <div id="invoiceConfirmError" style="display:none; color:#b91c1c; font-size:13px; margin-top:6px;"></div>
     <div class="confirm-actions">
      <button type="button" id="invoiceConfirmCancelBtn" class="btn btn-ghost">Cancel</button>
      <button type="button" id="invoiceConfirmOkBtn" class="btn btn-primary">Confirm</button>
     </div>
    `;

    overlay.appendChild(panel);
    getInvoiceRoot().appendChild(overlay);

    const box = document.getElementById('invoiceConfirmNumbersBox');
    if (box){
     box.textContent = invoiceNumbersText;
    }
    const input = document.getElementById('invoiceConfirmInput');
    if (input){
     input.value = '';
     input.focus();
     input.addEventListener('input', function(){
      const errEl = document.getElementById('invoiceConfirmError');
      if (errEl) errEl.style.display = 'none';
     });
    }

    const cleanup = function(result){
     try{ overlay.remove(); }catch(_){ }
     resolve(result);
    };

    document.getElementById('invoiceConfirmCancelBtn').addEventListener('click', function(ev){
     ev.preventDefault();
     cleanup(false);
    });
    document.getElementById('invoiceConfirmOkBtn').addEventListener('click', function(ev){
     ev.preventDefault();
     const v = (input && input.value ? input.value : '').trim();
     if (v !== invoiceNumbersText){
      const errEl = document.getElementById('invoiceConfirmError');
      if (errEl){
       errEl.textContent = 'Invoice number does not match. Confirm and try again.';
       errEl.style.display = 'block';
      }
      if (input){
       input.focus();
       input.select();
      }
      return;
     }
     cleanup(true);
    });

    overlay.addEventListener('click', function(ev){
     if (ev.target === overlay){
      cleanup(false);
     }
    });
   }catch(_){
    resolve(false);
   }
  });
 }

 function downloadExcel(){
  const d = document.getElementById('chkDeposit').checked;
  const w = document.getElementById('chkWithdraw').checked;
  const tradeType = (d && !w) ? 'I' : ((!d && w) ? 'O' : '');
  const remark = document.getElementById('remarkInput').value.trim();
  const memo = document.getElementById('memoInput').value.trim();
  const searchString = [remark, memo].filter(Boolean).join(' ');
  const dir = document.getElementById('sortDirection').value || 'desc';
  const order = (dir === 'asc') ? 'A' : 'D';
  const sdate = (document.getElementById('startDate')?.value || '').replaceAll('-','');
  const edate = (document.getElementById('endDate')?.value || '').replaceAll('-','');
  const accs = [];
  document.querySelectorAll('input[name="activeAccount"]:checked').forEach(chk=> accs.push(chk.value));
  if (!sdate || !edate || !accs.length){
   try{ if (window.AppAlert) window.AppAlert(' Download Bank account times Period Confirm.', { title: "Confirm" }); }catch(e2){}
   return;
  }

  const params = new URLSearchParams({
   sdate,
   edate,
   accounts: accs.join(','),
   tradeType,
   searchString,
   order
  });
  window.location.href = `${scriptRoot}/bank_activity/export?${params.toString()}`;
 }

 function dashDateFromYmd(ymd){
  if(!ymd || ymd.length!==8) return '';
  return `${ymd.slice(0,4)}-${ymd.slice(4,6)}-${ymd.slice(6,8)}`;
 }

 function buildDepositSummary(item){
  const parts = [];
  if (item.remark1) parts.push(item.remark1);
  if (item.remark2) parts.push(item.remark2);
  if (item.remark3) parts.push(item.remark3);
  if (!parts.length && item.memo) parts.push(item.memo);
  return parts.join(' | ');
 }

 async function loadMatchingInvoices(){
  const sdate = document.getElementById('startDate').value;
  const edate = document.getElementById('endDate').value;
  const url = `${scriptRoot}/bank_activity/matching/invoices?date_from=${encodeURIComponent(sdate)}&date_to=${encodeURIComponent(edate)}&currency=${encodeURIComponent(BANK_ACTIVITY_CURRENCY)}&limit=200`;
  const res = await fetchJSON(url);
  const tbody = document.querySelector('#matchInvoicesTable tbody');
  tbody.innerHTML = '';
  (res.items||[]).forEach((it, idx)=>{
   const tr = document.createElement('tr');
   tr.dataset.invoiceId = it.id;
   tr.innerHTML = `
    <td class="a_c">${idx+1}</td>
    <td class="a_c">${it.number||''}</td>
    <td class="a_c">${it.client_name||''}</td>
    <td class="a_c">${it.issue_date||''}</td>
    <td class="a_r">${formatBankActivityMoney(it.total||0)}</td>
   `;
   // drop targets
   tr.addEventListener('dragover', (ev)=>{ ev.preventDefault(); tr.classList.add('drop-ready'); });
   tr.addEventListener('dragleave', ()=> tr.classList.remove('drop-ready'));
   tr.addEventListener('drop', async (ev)=>{
    ev.preventDefault(); tr.classList.remove('drop-ready');
    try{
     const data = ev.dataTransfer.getData('text/plain');
     const dep = JSON.parse(data);
     await matchDepositToInvoice(it.id, dep, tr);
    }catch(e){ try{ await window.AppAlert((e && e.message) ? e.message : String(e), { title: "Error" }); }catch(e2){} }
   });
   tbody.appendChild(tr);
  });
 }

 async function loadMatchingDeposits(){
  const sdateStr = document.getElementById('startDate').value.replaceAll('-','');
  const edateStr = document.getElementById('endDate').value.replaceAll('-','');
  const accs = [];
  document.querySelectorAll('input[name="activeAccount"]:checked').forEach(chk=> accs.push(chk.value));
  if (!accs.length) return;
  const url = `${scriptRoot}/bank_activity/matching/deposits?sdate=${encodeURIComponent(sdateStr)}&edate=${encodeURIComponent(edateStr)}&accounts=${encodeURIComponent(accs.join(','))}&currency=${encodeURIComponent(BANK_ACTIVITY_CURRENCY)}&limit=500`;
  const res = await fetchJSON(url);
  const tbody = document.querySelector('#matchDepositsTable tbody');
  tbody.innerHTML = '';
  (res.items||[]).forEach((r)=>{
   const tr = document.createElement('tr');
   const alias = `${r.bankCode||''} ${r.accountNumber||''}`.trim();
   const summary = buildDepositSummary(r);
   tr.draggable = true;
   tr.addEventListener('dragstart', (ev)=>{
    tr.classList.add('dragging');
    const payload = {
     tid: r.tid, accIn: parseMoney(r.accIn||0), trdt: r.trdt||r.trdate, bankCode: r.bankCode, accountNumber: r.accountNumber,
     alias: alias, summary: summary
    };
    ev.dataTransfer.setData('text/plain', JSON.stringify(payload));
   });
   tr.addEventListener('dragend', ()=> tr.classList.remove('dragging'));
   tr.innerHTML = `
    <td class="a_c">${formatTrdt(r.trdt || r.trdate)}</td>
    <td class="a_r">${formatBankActivityMoney(r.accIn||0)}</td>
    <td class="a_c">${alias}</td>
    <td class="a_c">${summary||'-'}</td>
   `;
   tbody.appendChild(tr);
  });
 }

 async function matchDepositToInvoice(invoiceId, dep, trEl){
  // Build payment_meta for the selected invoice currency
  const dateStr = (function(){
   const dt = parseTrdtToDate(dep.trdt);
   if (!dt) return '';
   return `${dt.getFullYear()}-${pad2(dt.getMonth()+1)}-${pad2(dt.getDate())}`;
  })();
  const meta = {
   currency: BANK_ACTIVITY_CURRENCY,
   date: dateStr,
   account_alias: dep.alias || `${dep.bankCode||''} ${dep.accountNumber||''}`.trim(),
   deposit: parseMoney(dep.accIn||0),
   summary: dep.summary || ''
  };
  // Save then verify
  await fetchJSON(`${scriptRoot}/invoices/${invoiceId}/save_payment_meta`, {method:'POST', body: JSON.stringify({payment_meta: meta})});
  const v = await fetchJSON(`${scriptRoot}/invoices/${invoiceId}/verify_payment`, {method:'POST', body: JSON.stringify({payment_meta: meta})});
  if (v && v.ok){
   // Visually mark invoice row as matched
   try{
    const row = document.querySelector(`#matchInvoicesTable tr[data-invoice-id="${invoiceId}"]`);
    if (row){ row.style.background = '#ecfdf5'; row.title = ' Done (paid)'; }
  }catch(e){}
 } else {
   try{ await window.AppAlert(` : ${(v && v.reason) || ' people'}`, { title: "Confirm" }); }catch(e2){}
  }
 }

 async function refreshMatching(){
  await Promise.all([loadMatchingInvoices(), loadMatchingDeposits()]);
 }

 function startCoverageAutoRefresh(){
  if (coverageAutoRefreshTimer) window.clearInterval(coverageAutoRefreshTimer);
  // Keep scheduler/last-run info current even when the page stays open.
  coverageAutoRefreshTimer = window.setInterval(async ()=>{
   if (document.hidden) return;
   try{ await updateCoverage(); }catch(e){ console.error(e); }
  }, COVERAGE_AUTO_REFRESH_MS);
 }

 function stopCoverageAutoRefresh(){
  if (!coverageAutoRefreshTimer) return;
  window.clearInterval(coverageAutoRefreshTimer);
  coverageAutoRefreshTimer = null;
 }
