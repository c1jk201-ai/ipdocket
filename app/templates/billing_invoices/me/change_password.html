{% extends 'invoice_base.html' %}
{% block invoice_content %}
<div class="page-header" style="margin-bottom:16px;">
 <h2 style="margin:0;">🔑 Change</h2>
 <div class="page-actions">
  <a class="btn" href="{{ url_for('billing_invoices.core.my_profile') }}"> </a>
 </div>
</div>

<form method="post" class="card" style="max-width:600px;">
 <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

 {% if error %}
 <div style="padding:12px; background:#fef2f2; border:1px solid #fecaca; border-radius:6px; color:#dc2626; margin-bottom:16px;">
  <strong>⚠️ {{ error }}</strong>
 </div>
 {% endif %}

 <h3 style="margin-top:0;"> Change</h3>

 <div style="margin-bottom:16px;">
  <label style="display:block; margin-bottom:6px; font-weight:600;">Current <span style="color:#dc2626;">*</span></label>
  <input type="password" name="old_password" required style="width:100%; padding:10px; border:1px solid #d1d5db; border-radius:6px; font-size:1rem;">
 </div>

 <div style="margin-bottom:16px;">
  <label style="display:block; margin-bottom:6px; font-weight:600;"> <span style="color:#dc2626;">*</span></label>
  <input type="password" name="new_password" required minlength="6" style="width:100%; padding:10px; border:1px solid #d1d5db; border-radius:6px; font-size:1rem;">
  <div style="font-size:0.85rem; color:#6b7280; margin-top:4px;"> 6 </div>
 </div>

 <div style="margin-bottom:20px;">
  <label style="display:block; margin-bottom:6px; font-weight:600;"> Confirm <span style="color:#dc2626;">*</span></label>
  <input type="password" name="new_password_confirm" required minlength="6" style="width:100%; padding:10px; border:1px solid #d1d5db; border-radius:6px; font-size:1rem;">
 </div>

 <div style="padding:12px; background:#EAF4FF; border:1px solid #005EA8; border-radius:6px; margin-bottom:20px; font-size:0.9rem;">
  <strong>ℹ️ :</strong>
  <ul style="margin:8px 0; padding-left:20px;">
   <li> 8 </li>
   <li>Use at least one letter, number, or symbol.</li>
   <li>Recent 3items  none</li>
  </ul>
 </div>

 <div class="row">
  <button class="btn btn-primary btn-ui-prominent" type="submit"> Change</button>
  <a class="btn" href="{{ url_for('billing_invoices.core.my_profile') }}">Cancel</a>
 </div>
</form>
{% endblock %}
