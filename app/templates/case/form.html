{% extends "layouts/base.html" %} {% block content %}
<h2>Matter Registration</h2>
<form method="POST">
  <div class="card mb-3">
    <div class="card-header">Default </div>
    <div class="card-body row g-3">
      <div class="col-md-3">
        <label class="form-label">Matter </label>
        <select
          name="case_type"
          id="caseTypeSelector"
          class="form-select"
          onchange="toggleFields()"
        >
          <option value="PATENT">DomesticPatent</option>
          <option value="UTILITY">DomesticUtility model</option>
          <option value="DESIGN">DomesticDesign</option>
          <option value="TRADEMARK">DomesticTrademark</option>
          <option value="LITIGATION">/Litigation</option>
        </select>
      </div>
      <div class="col-md-3">
        <label class="form-label">Our Ref</label>
        <input class="form-control" type="text" name="ref_no" required />
      </div>
      <div class="col-md-3">
        <label class="form-label">Application No.</label>
        <input class="form-control" type="text" name="app_no" />
      </div>
      <div class="col-md-3">
        <label class="form-label">Type</label>
        <select class="form-select" name="division">
          <option value="DOM">DOM(Domestic)</option>
          <option value="INC">INC()</option>
          <option value="OUT">OUT(Foreign)</option>
        </select>
      </div>
      <div class="col-md-6">
        <label class="form-label">Title</label>
        <input class="form-control" type="text" name="title" />
      </div>
      <div class="col-md-3">
        <label class="form-label">Client ID</label>
        <input class="form-control" type="number" name="client_id" />
      </div>
      <div class="col-md-3">
        <label class="form-label">Status</label>
        <input
          class="form-control"
          type="text"
          name="status"
          placeholder=""
        />
      </div>
    </div>
  </div>

  <div id="field-PATENT" class="type-specific card mb-3" style="display: none">
    <div class="card-header">Patent Details</div>
    <div class="card-body row g-3">
      <div class="col-md-3">
        <label class="form-label">Filing type</label>
        <select class="form-select" name="app_type">
          <option value="NEW">Filing</option>
          <option value="DIV">Divisional application</option>
        </select>
      </div>
      <div class="col-md-3">
        <label class="form-label">Examination request</label>
        <input
          class="form-check-input ms-2"
          type="checkbox"
          name="exam_req_yn"
        />
      </div>
      <div class="col-md-3">
        <label class="form-label">Billing </label>
        <input class="form-control" type="number" name="claims_total" />
      </div>
      <div class="col-md-3">
        <label class="form-label"> </label>
        <input class="form-control" type="number" name="claims_indep" />
      </div>
    </div>
  </div>

  <div id="field-DESIGN" class="type-specific card mb-3" style="display: none">
    <div class="card-header">Design Details</div>
    <div class="card-body row g-3">
      <div class="col-md-4">
        <label class="form-label">Examination Type</label>
        <input class="form-control" type="text" name="exam_type" />
      </div>
      <div class="col-md-4">
        <label class="form-label">Design</label>
        <input
          class="form-check-input ms-2"
          type="checkbox"
          name="is_partial"
        />
      </div>
      <div class="col-md-4">
        <label class="form-label"></label>
        <input class="form-control" type="text" name="article_name" />
      </div>
    </div>
  </div>

  <div
    id="field-TRADEMARK"
    class="type-specific card mb-3"
    style="display: none"
  >
    <div class="card-header">Trademark Details</div>
    <div class="card-body row g-3">
      <div class="col-md-4">
        <label class="form-label">Trademark Type</label>
        <input class="form-control" type="text" name="tm_type" />
      </div>
      <div class="col-md-4">
        <label class="form-label">Trademark</label>
        <input class="form-control" type="text" name="tm_name" />
      </div>
      <div class="col-md-4">
        <label class="form-label">(Class, Type)</label>
        <input
          class="form-control"
          type="text"
          name="goods_class"
          placeholder="9,35,42"
        />
      </div>
    </div>
  </div>

  <div
    id="field-LITIGATION"
    class="type-specific card mb-3"
    style="display: none"
  >
    <div class="card-header">/Litigation Details</div>
    <div class="card-body row g-3">
      <div class="col-md-4">
        <label class="form-label">Type</label>
        <input class="form-control" type="text" name="trial_type" />
      </div>
      <div class="col-md-4">
        <label class="form-label">/</label>
        <input class="form-control" type="text" name="court" />
      </div>
      <div class="col-md-4">
        <label class="form-label">/Billing</label>
        <input class="form-control" type="text" name="plaintiff" />
      </div>
      <div class="col-md-4">
        <label class="form-label">/Billing</label>
        <input class="form-control" type="text" name="defendant" />
      </div>
    </div>
  </div>

  <button type="submit" class="btn btn-primary">Save</button>
  <a class="btn btn-secondary" href="{{ url_for('case_work.case_list') }}">List</a>
</form>

<script>
  function toggleFields() {
    const type = document.getElementById("caseTypeSelector").value;
    const targetType = type === "UTILITY" ? "PATENT" : type;
    document
      .querySelectorAll(".type-specific")
      .forEach((el) => (el.style.display = "none"));
    const target = document.getElementById("field-" + targetType);
    if (target) target.style.display = "block";
  }
  toggleFields();
</script>
{% endblock %}
