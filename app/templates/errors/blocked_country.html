{% extends "layouts/base.html" %}
{% block content %}
<div class="container py-5">
  <div class="text-center">
    <h1 class="display-6 fw-bold">403 - Forbidden</h1>
    <p class="text-muted mb-4">{{ message or "Access from this country is blocked." }}</p>
    {% if current_user.is_authenticated %}
    <a class="btn btn-primary" href="{{ url_for('main.index') }}">to</a>
    {% else %}
    <a class="btn btn-primary" href="{{ url_for('auth.login') }}">Login</a>
    {% endif %}
  </div>
</div>
{% endblock %}
