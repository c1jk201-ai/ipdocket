{% extends "layouts/base.html" %}

{% block content %}
<div class="d-flex align-items-center justify-content-center" style="min-height: calc(100vh - 120px);">
  <div class="w-100" style="max-width: 520px;">
    <div class="card shadow-sm border-0">
      <div class="card-body p-4">
        <div class="d-flex align-items-start justify-content-between gap-3 mb-3">
          <div>
            <div class="text-uppercase small text-muted fw-semibold d-flex align-items-center gap-2">
              {% if branding.logo_path %}
              <img src="{{ brand_asset_url(branding.logo_path) }}" alt="{{ branding.short_name }}" style="max-width:32px;max-height:24px;object-fit:contain;">
              {% endif %}
              <span>{{ branding.app_name }}</span>
            </div>
            <h1 class="h4 fw-bold mb-0">Test account sign-in</h1>
            <div class="text-muted small mt-1">Only <code>test_*</code> accounts can sign in here.</div>
          </div>
          <div class="d-flex align-items-center justify-content-center rounded-circle"
               style="width:44px;height:44px;background: rgba(57,72,103,0.08); color: var(--app-indigo);">
            <i class="bi bi-person-check"></i>
          </div>
        </div>

        <form method="POST">
          <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
          <div class="mb-3">
            <label for="username" class="form-label">Username</label>
            <input
              type="text"
              class="form-control"
              id="username"
              name="username"
              placeholder="test_demo01"
              required
            />
          </div>
          <div class="mb-3">
            <label for="password" class="form-label">Password</label>
            <input
              type="password"
              class="form-control"
              id="password"
              name="password"
              required
            />
          </div>
          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary">Sign in</button>
            <a class="btn btn-outline-secondary" href="{{ url_for('auth.login', next=request.args.get('next')) }}">Standard sign-in</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
