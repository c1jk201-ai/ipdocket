<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Upload too large</title>
    <style>
      body {
        margin: 0;
        font-family: "Noto Sans", "Segoe UI", Arial, Helvetica, sans-serif;
        background: #f4f6f8;
        color: #1f2937;
      }
      .wrap {
        max-width: 760px;
        margin: 8vh auto;
        padding: 24px;
      }
      .card {
        background: #fff;
        border-radius: 16px;
        padding: 32px 28px;
        box-shadow: 0 16px 40px rgba(15, 23, 42, 0.08);
      }
      h1 {
        margin: 0 0 12px;
        font-size: 30px;
      }
      p {
        margin: 0 0 16px;
        line-height: 1.6;
      }
      .notice {
        background: #fff7e6;
        border: 1px solid #facc15;
        border-radius: 12px;
        padding: 16px 18px;
        margin: 20px 0 24px;
      }
      .actions {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
      }
      .btn {
        display: inline-block;
        padding: 11px 16px;
        border-radius: 10px;
        text-decoration: none;
        font-weight: 600;
      }
      .btn-primary {
        background: #2563eb;
        color: #fff;
      }
      .btn-secondary {
        background: #e5e7eb;
        color: #111827;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="card">
        <h1>Upload too large</h1>
        <p>The file could not be uploaded because it exceeds the allowed size.</p>
        <div class="notice">
          <p><strong>Please choose a smaller file and try again.</strong></p>
          <p>If the file is required for the matter record, split it into smaller parts or compress it before uploading.</p>
          <p>The current upload limit is 50 MB.</p>
        </div>
        <div class="actions">
          <a class="btn btn-primary" href="javascript:history.back()">Go back</a>
          <a class="btn btn-secondary" href="/">Home</a>
        </div>
      </div>
    </div>
  </body>
</html>
